# =============================================================================
# Copier template configuration
# https://copier.readthedocs.io/en/stable/configuring/
# =============================================================================

# ---------------------------------------------------------------------------
# Questions
# ---------------------------------------------------------------------------
project_name:
  type: str
  help: "プロジェクト名 (pyproject.toml の name フィールド、例: my-cloud-run-app)"

description:
  type: str
  help: "プロジェクトの説明"
  default: "Add your description here"

python_version:
  type: str
  help: "Python バージョン"
  default: "3.13"
  choices:
    - "3.12"
    - "3.13"

# ---------------------------------------------------------------------------
# Template settings
# ---------------------------------------------------------------------------
_min_copier_version: "9.0.0"
_subdirectory: project
_templates_suffix: ".jinja"

_exclude:
  - .venv
  - "*.pyc"
  - __pycache__

_message_after_copy: |
  プロジェクトの生成が完了しました。次のコマンドで開発環境をセットアップしてください:

    cd {{ _copier_conf.dst_path }}
    make setup
